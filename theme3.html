<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIQOY — LOADING</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #FFF5E6;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
      overflow: hidden;
    }

    /* Halftone dot pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,107,53,0.06) 1.5px, transparent 1.5px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 560px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 2;
      background: #fff;
      border: 4px solid #1a1a2e;
      border-radius: 24px;
      padding: 48px 32px;
      box-shadow: 8px 8px 0 #1a1a2e;
      animation: bootIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes bootIn { from { opacity:0; transform:scale(0.85) rotate(-4deg); } to { opacity:1; transform:scale(1) rotate(0); } }

    .avatar {
      width: 100px; height: 100px;
      object-fit: cover;
      margin: 0 auto 28px;
      display: block;
      border: 4px solid #1a1a2e;
      border-radius: 50%;
      box-shadow: 5px 5px 0 rgba(26,26,46,0.12);
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .avatar:hover { transform: scale(1.12) rotate(-10deg); box-shadow: 8px 8px 0 rgba(26,26,46,0.18); }

    .status-line {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1a1a2e;
      margin-bottom: 16px;
      padding: 10px 24px;
      background: #FFD700;
      border: 3px solid #1a1a2e;
      border-radius: 100px;
      box-shadow: 4px 4px 0 #1a1a2e;
    }
    .status-dot {
      width: 8px; height: 8px;
      background: #1a1a2e;
      border-radius: 50%;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

    /* Construction overlay */
    .overlay {
      position: absolute; inset: 0; z-index: 5;
      background: rgba(255,245,230,0.88);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; border-radius: 20px;
      user-select: none;
      border: 4px dashed #FF6B35;
      animation: constrBorder 2s linear infinite;
    }
    @keyframes constrBorder { 0% { border-color: #FF6B35; } 50% { border-color: #1a1a2e; } 100% { border-color: #FF6B35; } }
    .overlay .constr-icon { font-size: 2.5rem; animation: constrSwing 1.5s ease-in-out infinite; }
    @keyframes constrSwing { 0%,100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }
    .overlay .constr-title { font-family: 'Bangers', cursive; font-size: clamp(2rem, 8vw, 3.5rem); color: #FF6B35; text-shadow: 3px 3px 0 #1a1a2e; letter-spacing: 0.04em; line-height: 1; }
    .overlay .constr-sub { font-size: 11px; color: #1a1a2e; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; opacity: 0.6; margin-top: 4px; }

    /* Comic burst behind pseudo */
    .title-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 4px;
    }
    .title-wrap::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 120%; height: 130%;
      transform: translate(-50%, -50%) rotate(-3deg);
      background: #FFD700;
      border: 4px solid #1a1a2e;
      border-radius: 8px;
      z-index: -1;
      box-shadow: 4px 4px 0 #1a1a2e;
      animation: burstPulse 2s ease-in-out infinite;
    }
    @keyframes burstPulse { 0%,100% { transform: translate(-50%,-50%) rotate(-3deg) scale(1); } 50% { transform: translate(-50%,-50%) rotate(-2deg) scale(1.04); } }

    /* Comic star decorations */
    .star {
      position: absolute;
      font-size: 1.5rem;
      user-select: none;
      pointer-events: none;
      animation: starFloat 3s ease-in-out infinite;
      color: #FF6B35;
    }
    @keyframes starFloat { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-10px) rotate(20deg); } }

    /* Action corner lines */
    .container::after {
      content: '';
      position: absolute;
      top: -6px; right: -6px;
      width: 30px; height: 30px;
      border-top: 5px solid #FF6B35;
      border-right: 5px solid #FF6B35;
      border-radius: 0 12px 0 0;
    }
    .container::before {
      content: '';
      position: absolute;
      bottom: -6px; left: -6px;
      width: 30px; height: 30px;
      border-bottom: 5px solid #FF6B35;
      border-left: 5px solid #FF6B35;
      border-radius: 0 0 0 12px;
    }

    .pseudo {
      font-family: 'Bangers', cursive;
      font-size: clamp(5rem, 16vw, 8rem);
      font-weight: 400;
      line-height: 0.9;
      color: #FF6B35;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
      text-shadow:
        3px 3px 0 #1a1a2e,
        -1px -1px 0 #1a1a2e,
        1px -1px 0 #1a1a2e,
        -1px 1px 0 #1a1a2e;
      animation: wobble 3s ease-in-out infinite;
    }
    @keyframes wobble {
      0%,100% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(-2deg) scale(1.02); }
      75% { transform: rotate(2deg) scale(1.02); }
    }

    .tagline {
      font-size: 1rem;
      color: #1a1a2e;
      font-weight: 600;
      max-width: 420px;
      margin: 12px auto 32px;
    }
    .tagline span {
      color: #FF6B35;
      display: inline-block;
      animation: pop 2s ease-in-out infinite;
    }
    @keyframes pop { 0%,100% { transform:scale(1); } 50% { transform:scale(1.08); } }

    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 34px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: 3px solid #1a1a2e;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
      text-decoration: none;
      font-family: 'Inter', sans-serif;
    }
    .btn:hover { transform: translateY(-4px) scale(1.04); }
    .btn:active { transform: scale(0.95); }

    .btn--primary {
      background: #FF6B35;
      color: #fff;
      box-shadow: 4px 4px 0 #1a1a2e;
    }
    .btn--primary:hover { box-shadow: 6px 6px 0 #1a1a2e; background: #ff8255; }

    .btn--outline {
      background: #fff;
      color: #1a1a2e;
      box-shadow: 4px 4px 0 rgba(26,26,46,0.1);
    }
    .btn--outline:hover { box-shadow: 6px 6px 0 rgba(26,26,46,0.15); }

    .btn__arrow {
      display: inline-block;
      transition: transform 0.2s;
    }
    .btn:hover .btn__arrow { transform: translateX(5px); }

    .divider {
      width: 80px;
      height: 4px;
      background: #FF6B35;
      border-radius: 999px;
      margin: 28px auto;
    }

    .footer-text {
      font-size: 12px;
      color: rgba(26,26,46,0.3);
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    /* ─── Music Player ─── */
    .player {
      position: fixed; bottom: 24px; right: 24px; z-index: 20;
      display: flex; flex-direction: column; align-items: flex-end;
    }
    .player__toggle {
      width: 48px; height: 48px; min-width: 48px;
      border: 3px solid #1a1a2e; border-radius: 16px; cursor: pointer;
      background: #FFD700; color: #1a1a2e;
      box-shadow: 4px 4px 0 #1a1a2e;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
      display: flex; align-items: center; justify-content: center;
    }
    .player__toggle:hover { transform: translateY(-3px) scale(1.05); box-shadow: 6px 6px 0 #1a1a2e; }
    .player__toggle:active { transform: scale(0.92); }
    .player__toggle svg { width: 22px; height: 22px; }
    .player__card {
      position: absolute; bottom: 58px; right: 0;
      background: #fff;
      border: 3px solid #1a1a2e;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 6px 6px 0 #1a1a2e;
      display: none; flex-direction: column; gap: 14px;
      width: 300px;
      max-width: calc(100vw - 48px);
      transform-origin: bottom right;
      transform-style: preserve-3d;
      will-change: transform;
      animation: cardIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
      transition: box-shadow 0.2s, transform 0.15s cubic-bezier(0.22,1,0.36,1);
    }
    .player__card--open { display: flex; }
    @keyframes cardIn { from { opacity:0; transform:scale(0.85) translateY(10px) rotate(-3deg); } to { opacity:1; transform:scale(1) translateY(0) rotate(0); } }
    .player__head { display: flex; gap: 16px; align-items: center; }
    .player__cover { width: 62px; height: 62px; border-radius: 14px; object-fit: cover; flex-shrink: 0; border: 3px solid #FF6B35; transition: transform 0.3s ease; }
    .player__cover:hover { transform: scale(1.08) rotate(-5deg); }
    .player__cover--playing { animation: coverBounce 1s ease-in-out infinite; }
    @keyframes coverBounce { 0%,100% { transform:scale(1) rotate(0); } 50% { transform:scale(1.05) rotate(-4deg); } }
    .player__meta { flex: 1; min-width: 0; }
    .player__title { font-size: 15px; font-weight: 700; color: #1a1a2e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player__artist { font-size: 13px; color: rgba(26,26,46,0.4); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
    .player__progress { display: flex; flex-direction: column; gap: 6px; }
    .player__bar {
      width: 100%; height: 10px; -webkit-appearance: none; appearance: none;
      border-radius: 999px; outline: none; cursor: pointer;
      background: rgba(26,26,46,0.08);
      border: 2px solid #1a1a2e;
    }
    .player__bar::-webkit-slider-thumb {
      -webkit-appearance: none; width: 20px; height: 20px;
      border-radius: 999px; background: #FF6B35; cursor: pointer;
      border: 3px solid #1a1a2e;
      box-shadow: 2px 2px 0 #1a1a2e;
    }
    .player__times { display: flex; justify-content: space-between; font-size: 12px; color: rgba(26,26,46,0.3); font-weight: 700; }
    .player__actions { display: flex; align-items: center; gap: 8px; }
    .player__btn {
      width: 44px; height: 44px; min-width: 44px;
      border: 3px solid #1a1a2e; border-radius: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      background: #fff; color: #1a1a2e;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .player__btn:hover { background: #FFD700; transform: translateY(-2px) scale(1.05); }
    .player__btn:active { transform: scale(0.90); }
    .player__btn svg { width: 18px; height: 18px; }
    .player__btn--play { width: 48px; height: 48px; min-width: 48px; background: #FF6B35; color: #fff; box-shadow: 3px 3px 0 #1a1a2e; }
    .player__btn--play:hover { background: #ff8255; transform: translateY(-3px) scale(1.06); box-shadow: 4px 4px 0 #1a1a2e; }
    .player__btn--play:active { transform: scale(0.90); }
    .player__volume { flex: 1; display: flex; align-items: center; gap: 8px; margin-left: 6px; }
    .player__vol-icon { color: rgba(26,26,46,0.3); display: flex; align-items: center; }
    .player__vol-icon svg { width: 16px; height: 16px; }
    .player__vol {
      width: 100%; height: 10px; -webkit-appearance: none; appearance: none;
      border-radius: 999px; outline: none; cursor: pointer;
      background: rgba(26,26,46,0.08); border: 2px solid #1a1a2e;
    }
    .player__vol::-webkit-slider-thumb {
      -webkit-appearance: none; width: 20px; height: 20px;
      border-radius: 999px; background: #1a1a2e; cursor: pointer; border: none;
      box-shadow: 2px 2px 0 rgba(26,26,46,0.2);
    }
    @media (max-width: 540px) {
      .player { right: 12px; bottom: 12px; }
      .player__card { width: calc(100vw - 24px); right: 0; }
      .player__toggle { width: 52px; height: 52px; min-width: 52px; border-radius: 18px; }
      .player__toggle svg { width: 24px; height: 24px; }
      .player__btn--play { width: 52px; height: 52px; min-width: 52px; }
      .player__vol { width: 80px; min-width: 60px; }
    }

    /* ─── Language ─── */
    .lang-switch {
      position: fixed;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 4px;
      padding: 6px;
      background: #fff;
      border: 3px solid #1a1a2e;
      border-radius: 16px;
      box-shadow: 3px 3px 0 #1a1a2e;
      z-index: 10;
    }
    .lang-btn {
      padding: 6px 12px;
      border: none;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      color: rgba(26,26,46,0.3);
      background: transparent;
      font-family: 'Inter', sans-serif;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .lang-btn:hover { color: #1a1a2e; background: rgba(255,107,53,0.06); }
    .lang-btn--active { background: #FF6B35; color: #fff; }
    .lang-btn--active:hover { background: #FF6B35; color: #fff; }

    /* ─── Theme ─── */
    .theme-switch {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      padding: 6px;
      background: #fff;
      border: 3px solid #1a1a2e;
      border-radius: 16px;
      box-shadow: 3px 3px 0 #1a1a2e;
      z-index: 10;
    }
    .theme-btn {
      padding: 6px 14px;
      border: none;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      color: rgba(26,26,46,0.3);
      background: transparent;
      font-family: 'Inter', sans-serif;
      border-radius: 10px;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .theme-btn:hover { color: #1a1a2e; background: rgba(255,107,53,0.06); }
    .theme-btn--active { background: #FF6B35; color: #fff; }
    .theme-btn--active:hover { background: #FF6B35; color: #fff; }
    @media (max-width: 480px) {
      body { padding: 24px 12px; }
      .container { padding: 28px 16px; }
      .pseudo { font-size: clamp(3.5rem, 14vw, 5rem); }
      .tagline { font-size: 0.85rem; }
      .btn { padding: 12px 20px; font-size: 12px; }
      .lang-switch { top: 12px; right: 12px; padding: 4px; gap: 2px; }
      .lang-btn { padding: 4px 8px; font-size: 10px; }
      .theme-switch { bottom: 12px; padding: 4px; gap: 2px; }
      .theme-btn { padding: 4px 10px; font-size: 10px; }
    }
  </style>
</head>
  <body>
    <div class="container">
      <div class="overlay">
        <span class="constr-icon">🚧</span>
        <span class="constr-title" id="constrTitle">EN CONSTRUCTION</span>
        <span class="constr-sub" id="constrSub">▸ EN PRÉPARATION ◂</span>
      </div>
      <span class="star" style="top:3%;left:12%;">✦</span>
      <span class="star" style="top:5%;right:18%;font-size:1rem;color:#FF6B35;animation-delay:-0.5s;">★</span>
      <span class="star" style="bottom:8%;right:10%;font-size:2rem;animation-delay:-1.5s;color:#FFD700;">✦</span>
      <div class="title-wrap">
        <img src="./logo.ico" alt="LIQOY" class="avatar" />
      </div>
      <h1 class="pseudo">LIQOY</h1>
      <p class="tagline" id="tagline">
        <span>BEDWARS</span> / <span>TECH</span> — COMMING SOON
      </p>
    <div class="btn-row">
      <a href="mailto:liqoymc@gmail.com" class="btn btn--primary" id="btnContact">
        CONTACT
        <span class="btn__arrow">→</span>
      </a>
      <a href="https://guns.lol/liqoy" target="_blank" rel="noopener" class="btn btn--outline" id="btnGuns">
        GUNS.LOL
        <span class="btn__arrow">→</span>
      </a>
    </div>
    <div class="divider"></div>
    <p class="footer-text" id="footerText">// SYSTEM: PREPARING DEPLOYMENT</p>
    <div class="status-line">
      <span class="status-dot"></span>
      <span id="statusText">STATUS: SUCCESS</span>
    </div>
  </div>

  <nav class="lang-switch">
    <button class="lang-btn lang-btn--active" data-lang="fr">FR</button>
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="es">ES</button>
    <button class="lang-btn" data-lang="de">DE</button>
  </nav>

  <nav class="theme-switch">
    <a href="./index.html" class="theme-btn">Pro</a>
    <a href="./theme2.html" class="theme-btn">Créa</a>
    <a href="./theme3.html" class="theme-btn theme-btn--active">Tuff</a>
  </nav>

  <div class="player" id="player">
    <button class="player__toggle" id="playerToggle">
      <svg viewBox="0 0 24 24" fill="#1a1a2e"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    </button>
    <div class="player__card" id="playerCard">
      <div class="player__head">
        <img class="player__cover" id="playerCover" src="" alt="" />
        <div class="player__meta">
          <p class="player__title" id="playerTitle">Titre</p>
          <p class="player__artist" id="playerArtist">Artiste</p>
        </div>
      </div>

        <input type="range" class="player__bar" id="playerProgress" min="0" max="100" value="0" step="0.1" />

          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="#fff"/></svg>

          <svg viewBox="0 0 24 24" fill="#1a1a2e"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <div class="player__volume">
          <span class="player__vol-icon">

        </div>
      </div>
    </div>
    <audio id="audioPlayer" preload="metadata"></audio>

  <script>
    const translations = {
      fr: {
        constrTitle: 'EN CONSTRUCTION',
        constrSub: '▸ EN PRÉPARATION ◂',
        status: 'STATUT: SUCCÈS',
        tagline: '<span>BEDWARS</span> / <span>TECH</span> — BIENTÔT',
        btnContact: 'CONTACT',
        btnGuns: 'GUNS.LOL',
        footerText: '// SYSTÈME: PRÉPARATION EN COURS'
      },
      en: {
        constrTitle: 'UNDER CONSTRUCTION',
        constrSub: '▸ IN PROGRESS ◂',
        status: 'STATUS: SUCCESS',
        tagline: '<span>BEDWARS</span> / <span>TECH</span> — COMMING SOON',
        btnContact: 'CONTACT',
        btnGuns: 'GUNS.LOL',
        footerText: '// SYSTEM: PREPARING DEPLOYMENT'
      },
      es: {
        constrTitle: 'EN CONSTRUCCIÓN',
        constrSub: '▸ EN PREPARACIÓN ◂',
        status: 'ESTADO: ÉXITO',
        tagline: '<span>BEDWARS</span> / <span>TECH</span> — PRÓXIMAMENTE',
        btnContact: 'CONTACTO',
        btnGuns: 'GUNS.LOL',
        footerText: '// SISTEMA: PREPARANDO DESPLIEGUE'
      },
      de: {
        constrTitle: 'IN BEARBEITUNG',
        constrSub: '▸ IN VORBEREITUNG ◂',
        status: 'STATUS: ERFOLG',
        tagline: '<span>BEDWARS</span> / <span>TECH</span> — DEMNÄCHST',
        btnContact: 'KONTAKT',
        btnGuns: 'GUNS.LOL',
        footerText: '// SYSTEM: VORBEREITUNG LÄUFT'
      }
    };

    function applyLang(lang) {
      const t = translations[lang];
      document.getElementById('constrTitle').textContent = t.constrTitle;
      document.getElementById('constrSub').textContent = t.constrSub;
      document.getElementById('statusText').textContent = t.status;
      document.getElementById('tagline').innerHTML = t.tagline;
      document.getElementById('btnContact').innerHTML = t.btnContact + ' <span class="btn__arrow">→</span>';
      document.getElementById('btnGuns').innerHTML = t.btnGuns + ' <span class="btn__arrow">→</span>';
      document.getElementById('footerText').textContent = t.footerText;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('lang-btn--active'));
      document.querySelector('.lang-btn[data-lang="'+lang+'"]').classList.add('lang-btn--active');
      localStorage.setItem('liqoyLang', lang);
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => applyLang(btn.dataset.lang));
    });
    if (localStorage.getItem('liqoyLang')) applyLang(localStorage.getItem('liqoyLang'));

    const songs = [
      { title: 'The Sweet Escape', artist: 'Gwen Stefani', cover: './music/music 1/SpotiMate.io - The Sweet Escape - Gwen Stefani.jpg', src: './music/music 1/SpotiMate.io - The Sweet Escape - Gwen Stefani.mp3' },
      { title: 'Confident', artist: 'Justin Bieber', cover: './music/music 2/SpotiMate.io - Confident - Justin Bieber.jpg', src: './music/music 2/SpotiMate.io - Confident - Justin Bieber.mp3' },
      { title: 'greedy', artist: 'Tate McRae', cover: './music/music 3/SpotiMate.io - greedy - Tate McRae.jpg', src: './music/music 3/SpotiMate.io - greedy - Tate McRae.mp3' },
      { title: 'One Kiss (with Dua Lipa)', artist: 'Calvin Harris', cover: './music/music 4/SpotiMate.io - One Kiss _with Dua Lipa_ - Calvin Harris.jpg', src: './music/music 4/SpotiMate.io - One Kiss _with Dua Lipa_ - Calvin Harris.mp3' },
      { title: 'S&M', artist: 'Rihanna', cover: './music/music 5/SpotiMate.io - S_M - Rihanna.jpg', src: './music/music 5/SpotiMate.io - S_M - Rihanna.mp3' }
    ];
    let currentSong = 0;
    let isPlaying = false;
    const audio = document.getElementById('audioPlayer');
    const playBtn = document.getElementById('playerPlay');
    const prevBtn = document.getElementById('playerPrev');
    const nextBtn = document.getElementById('playerNext');
    const toggleBtn = document.getElementById('playerToggle');
    const card = document.getElementById('playerCard');
    const coverImg = document.getElementById('playerCover');
    const titleEl = document.getElementById('playerTitle');
    const artistEl = document.getElementById('playerArtist');
    const progBar = document.getElementById('playerProgress');
    const volBar = document.getElementById('playerVolume');
    const timeCur = document.getElementById('playerCurrent');
    const timeTot = document.getElementById('playerTotal');

    function fmt(t) { const m = Math.floor(t/60); const s = Math.floor(t%60); return m+':'+(s<10?'0':'')+s; }

    function loadSong(i) {
      const s = songs[i]; currentSong = i;
      coverImg.src = s.cover; titleEl.textContent = s.title; artistEl.textContent = s.artist;
      audio.src = s.src; audio.load();
    }

    function togglePlay() {
      if (audio.paused) { audio.play().catch(function() { isPlaying = false; updatePlayBtn(); }); }
      else { audio.pause(); }
    }

    function updatePlayBtn() {
      const svg = audio.paused
        ? '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="#fff"/></svg>'
        : '<svg viewBox="0 0 24 24"><path d="M6 4h4v16H6zM14 4h4v16h-4z" fill="#fff"/></svg>';
      playBtn.innerHTML = svg;
    }

    function nextSong() { loadSong((currentSong+1)%songs.length); if (isPlaying) { audio.play().catch(function() { isPlaying = false; updatePlayBtn(); }); } else { updatePlayBtn(); } }
    function prevSong() { loadSong((currentSong-1+songs.length)%songs.length); if (isPlaying) { audio.play().catch(function() { isPlaying = false; updatePlayBtn(); }); } else { updatePlayBtn(); } }

    document.addEventListener('click', function firstPlay(e) {
      if (!e.target.closest('.player') && audio.src) {
        var p = audio.play();
        if (p && p.then) { p.then(function() { audio.pause(); }).catch(function() {}); }
      }
      document.removeEventListener('click', firstPlay);
    }, { once: true });

    audio.addEventListener('loadedmetadata', function() {
      timeTot.textContent = fmt(audio.duration);
      progBar.max = audio.duration;
    });

    audio.addEventListener('timeupdate', function() {
      progBar.value = audio.currentTime;
      timeCur.textContent = fmt(audio.currentTime);
      progBar.style.background = 'linear-gradient(to right, #FF6B35 '+(progBar.value/progBar.max*100)+'%, rgba(26,26,46,0.08) '+(progBar.value/progBar.max*100)+'%)';
    });

    audio.addEventListener('play', function() { isPlaying = true; updatePlayBtn(); coverImg.classList.add('player__cover--playing'); });
    audio.addEventListener('pause', function() { isPlaying = false; updatePlayBtn(); coverImg.classList.remove('player__cover--playing'); });
    audio.addEventListener('ended', function() { updatePlayBtn(); coverImg.classList.remove('player__cover--playing'); nextSong(); });

    progBar.addEventListener('input', function() { audio.currentTime = this.value; });
    volBar.addEventListener('input', function() { audio.volume = this.value; });

    // Restore music state across themes (localStorage)
    (function() {
      const ss = localStorage.getItem('liqoySong'), st = localStorage.getItem('liqoyTime');
      const sp = localStorage.getItem('liqoyPlaying'), sv = localStorage.getItem('liqoyVolume');
      if (ss !== null) {
        loadSong(parseInt(ss));
        if (sv !== null) { audio.volume = parseFloat(sv); volBar.value = parseFloat(sv); }
        if (st !== null) {
          audio.addEventListener('loadedmetadata', function() {
            audio.currentTime = Math.min(parseFloat(st), audio.duration || 0);
            if (sp === '1') audio.play().catch(function() { isPlaying = false; updatePlayBtn(); });
          }, { once: true });
        }
      } else { loadSong(0); }
    })();
    playBtn.addEventListener('click', togglePlay);
    nextBtn.addEventListener('click', nextSong);
    prevBtn.addEventListener('click', prevSong);
    toggleBtn.addEventListener('click', function() { card.classList.toggle('player__card--open'); });
    // 3D tilt effect on card (skips interactive children to prevent cursor flicker)
    var tiltRAF = null;
    card.addEventListener('mousemove', function(e) {
      if (e.target.closest('button,input,a')) { return; }
      if (tiltRAF) { cancelAnimationFrame(tiltRAF); }
      var el = this;
      tiltRAF = requestAnimationFrame(function() {
        var rect = el.getBoundingClientRect();
        var x = (e.clientX - rect.left) / rect.width;
        var y = (e.clientY - rect.top) / rect.height;
        el.style.transform = 'perspective(600px) rotateX('+((y-0.5)*14)+'deg) rotateY('+((0.5-x)*14)+'deg)';
        tiltRAF = null;
      });
    });
    card.addEventListener('mouseleave', function() {
      if (tiltRAF) { cancelAnimationFrame(tiltRAF); tiltRAF = null; }
      this.style.transform = '';
    });
    // Save music state on page leave (cross-theme)
    window.addEventListener('beforeunload', function() {
      localStorage.setItem('liqoySong', currentSong);
      localStorage.setItem('liqoyTime', audio.currentTime);
      localStorage.setItem('liqoyPlaying', isPlaying ? '1' : '0');
      localStorage.setItem('liqoyVolume', audio.volume);
    });
  </script>
</body>
</html>
